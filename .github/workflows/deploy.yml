name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: us-central1
  SERVICE_NAME: dashboard-app
  REPO_NAME: dashboard-images

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build container with Cloud Build
        run: |
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --substitutions=_IMAGE_TAG=${{ github.sha }},_TRIGGER_TOKEN=${{ secrets.TRIGGER_TOKEN }} \
            --project=${{ secrets.GCP_PROJECT }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image=$REGION-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/$REPO_NAME/app:${{ github.sha }} \
            --region=$REGION \
            --project=${{ secrets.GCP_PROJECT }} \
            --allow-unauthenticated \
            --cpu=1 \
            --memory=512Mi \
            --no-cpu-throttling \
            --timeout=900 \
            --set-secrets=TRIGGER_TOKEN=TRIGGER_TOKEN:latest

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME \
            --region=$REGION \
            --project=${{ secrets.GCP_PROJECT }} \
            --format='value(status.url)')
          echo "✅ Deployed to $URL"
          echo "SERVICE_URL=$URL" >> $GITHUB_ENV
